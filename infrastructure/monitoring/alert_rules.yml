groups:
  - name: ai-brain-alerts
    rules:
      # ── PM2 Service Restart Alert ──
      - alert: PM2ServiceHighRestart
        expr: increase(pm2_process_restart_count[1h]) > 3
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "PM2 service restarting too frequently"
          description: "Service {{ $labels.instance }} has restarted {{ $value }} times in the last hour"

      # ── High Memory Usage ──
      - alert: HighMemoryUsage
        expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes > 0.85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage detected"
          description: "Memory usage is above 85% (current: {{ $value | humanizePercentage }})"

      # ── High CPU Usage ──
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 90
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage detected"
          description: "CPU usage is above 90% (current: {{ $value }}%)"

      # ── Disk Space Alert ──
      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Disk space running low"
          description: "Less than 10% disk space remaining"

      # ── Qdrant Down ──
      - alert: QdrantDown
        expr: up{job="qdrant"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Qdrant vector database is down"

      # ── Bot Response Latency ──
      - alert: HighResponseLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{job="ai-brain-bot"}[5m])) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Bot response latency is high"
          description: "95th percentile response time is {{ $value }}s"

      # ── Vector Search Latency ──
      - alert: VectorSearchSlow
        expr: histogram_quantile(0.95, rate(vector_search_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Vector search is slow"
          description: "95th percentile vector search time is {{ $value }}s"
