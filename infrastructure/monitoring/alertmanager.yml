global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'discord-webhook'

  routes:
    - match:
        severity: critical
      receiver: 'discord-webhook-critical'
      repeat_interval: 1h

receivers:
  - name: 'discord-webhook'
    webhook_configs:
      - url: 'http://bot:3000/api/alerts'
        send_resolved: true

  - name: 'discord-webhook-critical'
    webhook_configs:
      - url: 'http://bot:3000/api/alerts/critical'
        send_resolved: true
