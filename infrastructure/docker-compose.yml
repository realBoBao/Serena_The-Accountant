# ═══════════════════════════════════════════════════════════════
# Docker Compose — AI Brain Production Stack
# ═══════════════════════════════════════════════════════════════
# Usage:
#   docker compose up -d          # Start all services
#   docker compose logs -f        # View logs
#   docker compose down           # Stop all services
# ═══════════════════════════════════════════════════════════════

version: '3.8'

services:
  ai-brain:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-brain
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "3005:3005"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - REDIS_HOST=redis
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./artifacts:/app/artifacts
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'

  redis:
    image: redis:7-alpine
    container_name: ai-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: ai-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G

volumes:
  redis-data:
  qdrant-data:

networks:
  ai-network:
    driver: bridge
