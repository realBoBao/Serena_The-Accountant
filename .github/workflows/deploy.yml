# ═══════════════════════════════════════════════════════════════
# CI/CD Pipeline — Auto Deploy to VPS
# Trigger: push to main branch
# ═══════════════════════════════════════════════════════════════

name: Deploy to VPS

on:
  push:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USERNAME }}
          key: ${{ secrets.GCP_SSH_KEY }}
          port: ${{ secrets.GCP_SSH_PORT || '22' }}
          timeout: 120s
          envs: GH_PAT
          script: |
            set -e
            echo "=== Starting deployment at $(date) ==="

            # Ensure project directory exists
            if [ ! -d ~/ai-brain ]; then
              echo "📁 Cloning project..."
              git clone https://github.com/realBoBao/Serena_Auto-Teaching.git ~/ai-brain
            fi

            cd ~/ai-brain
            echo "📁 Working dir: $(pwd)"

            # Sync latest code (hard reset to avoid conflicts)
            echo "📥 Syncing latest code..."
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            # Ensure Node 20 is active (via NVM)
            echo "🔧 Checking Node version..."
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            nvm use 20 2>/dev/null || true
            node --version
            npm --version

            # Install dependencies
            echo "📦 Installing dependencies..."
            rm -f package-lock.json
            rm -rf node_modules
            npm install --legacy-peer-deps --only-production 2>&1 | tail -10
            echo "📦 Installed $(ls node_modules | wc -l) packages"

            # Run tests (optional, skip if no API keys)
            echo "🧪 Running tests..."
            npm test 2>&1 | tail -5 || echo "⚠️ Tests skipped (missing API keys)"

            # Restart PM2
            echo "🔄 Restarting PM2..."
            pm2 restart AI_Brain --update-env 2>/dev/null || pm2 start ecosystem.config.cjs
            pm2 save

            echo "✅ Deployment complete at $(date)"
            echo "✅ Deployment complete at $(date)"
        env:
          GH_PAT: ${{ secrets.GH_PAT }}

      - name: Notify Discord (Success)
        if: success()
        run: |
          curl -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d '{"embeds":[{"title":"✅ Deployment Complete","description":"Code pushed to main and deployed successfully trên AI Phase 15","color":65280}]}'

      - name: Notify Discord (Failure)
        if: failure()
        run: |
          curl -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d '{"embeds":[{"title":"❌ Deployment Failed","description":"Check GitHub Actions logs for details","color":16711680}]}'