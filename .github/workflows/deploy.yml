# ═══════════════════════════════════════════════════════════════
# CI/CD Pipeline — Auto Deploy to VPS
# Trigger: push to main branch
# ═══════════════════════════════════════════════════════════════

name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USERNAME }}
          key: ${{ secrets.GCP_SSH_KEY }}
          port: ${{ secrets.GCP_SSH_PORT || '22' }}
          timeout: 300s
          script: |
            set -e
            echo "=== Starting deployment at $(date) ==="

            # Ensure project directory exists
            if [ ! -d ~/ai-brain ]; then
              echo "📁 Cloning project..."
              git clone https://github.com/realBoBao/Serena_Project00_Auto-Teaching.git ~/ai-brain
            fi

            cd ~/ai-brain
            echo "📁 Working dir: $(pwd)"

            # Sync latest code (hard reset to avoid conflicts)
            echo "📥 Syncing latest code..."
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            # Ensure Node 20 is active (via NVM)
            echo "🔧 Checking Node version..."
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            nvm use 20 2>/dev/null || true
            node --version
            npm --version

            # Install Python dependencies (for document_parser.js)
            echo "🐍 Installing Python dependencies..."
            if ! command -v pip3 &> /dev/null; then
              sudo apt-get install -y -qq python3-pip
            fi
            pip3 install -r requirements.txt || echo "⚠️ Python deps install skipped"

            # Install Node dependencies
            echo "📦 Installing Node dependencies..."
            npm install --legacy-peer-deps --no-audit --no-fund
            # Rebuild native modules (better-sqlite3 needs g++ on Linux)
            echo "🔧 Rebuilding native modules..."
            if ! command -v g++ &> /dev/null; then
              sudo apt-get install -y -qq build-essential python3
            fi
            npm rebuild better-sqlite3 2>&1 || echo "⚠️ better-sqlite3 rebuild skipped (prebuilt binary)"
            echo "📦 Installed $(ls node_modules | wc -l) packages"

            # Rebuild native modules for current Node version (sqlite3 needs C++ compiler)
            echo "🔧 Rebuilding native modules..."
            if ! command -v g++ &> /dev/null; then
              echo "📦 Installing build-essential..."
              sudo apt-get update -qq && sudo apt-get install -y -qq build-essential python3
            fi
            npm rebuild || echo "⚠️ npm rebuild failed"

            # Reload PM2 (Tier 1: reload ALL processes, not just AI_Brain)
            echo "🔄 Reloading PM2 Ecosystem..."
            pm2 reload ecosystem.config.cjs --update-env 2>/dev/null || pm2 start ecosystem.config.cjs
            pm2 save

            echo "✅ Deployment complete at $(date)"
