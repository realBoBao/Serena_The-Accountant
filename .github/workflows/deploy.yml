# ═══════════════════════════════════════════════════════════════
# CI/CD Pipeline — Auto Deploy to VPS
# Trigger: push to main branch
# ═══════════════════════════════════════════════════════════════

name: Deploy to VPS

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USERNAME }}
          key: ${{ secrets.GCP_SSH_KEY }}
          timeout: 120s
          envs: GH_PAT
          script: |
            set -e
            echo "=== Starting deployment at $(date) ==="
            cd ~/ai-brain || { echo "❌ Project dir not found"; exit 1; }
            echo "📁 Working dir: $(pwd)"
            echo "📥 Pulling latest code..."
            # Stash local changes (package-lock.json, runtime data) before pull
            git stash --include-untracked 2>/dev/null || true
            git pull https://x-access-token:${GH_PAT}@github.com/realBoBao/Serena_Project00_Auto-Teaching.git main
            echo "📦 Installing dependencies..."
            # Remove old lock file and node_modules to avoid version conflicts
            rm -f package-lock.json
            rm -rf node_modules
            # Fresh install with legacy peer deps (Node 20 compatible)
            npm install --legacy-peer-deps --only-production 2>&1 | tail -10
            echo "📦 Installed $(ls node_modules | wc | awk '{print $1}') packages"
            echo "🔄 Restarting PM2..."
            pm2 restart AI_Brain --update-env || pm2 start ecosystem.config.cjs
            pm2 save
            echo "✅ Deployment complete at $(date)"
        env:
          GH_PAT: ${{ secrets.GH_PAT }}

      - name: Notify Discord (Success)
        if: success()
        run: |
          curl -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d '{"embeds":[{"title":"✅ Deployment Complete","description":"Code pushed to main and deployed successfully trên AI Phase 15","color":65280}]}'

      - name: Notify Discord (Failure)
        if: failure()
        run: |
          curl -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d '{"embeds":[{"title":"❌ Deployment Failed","description":"Check GitHub Actions logs for details","color":16711680}]}'