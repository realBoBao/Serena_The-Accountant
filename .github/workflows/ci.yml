name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

env:
  NODE_VERSION: '22'

jobs:
  # ── Job 1: Lint & Format ─────────────────────────────────
  lint:
    name: 🔍 Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install --legacy-peer-deps
      - run: npx prettier --check "**/*.js" "**/*.json" "**/*.md" || true
      - run: npx eslint . --ext .js --max-warnings=50 || true

  # ── Job 2: Unit Tests ────────────────────────────────────
  test:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install --legacy-peer-deps
      - run: node --experimental-vm-modules node_modules/jest/bin/jest.js tests/socratic.test.js tests/incident_agent.test.js tests/shadow_review.test.js tests/mood_state.test.js tests/vector_collections.test.js tests/flashcard_generator.test.js tests/groq_provider.test.js tests/datalog_engine.test.js tests/vibe_coding_audit.test.js tests/privileged_agent.test.js tests/code_sandbox.test.js tests/sandbox_security.test.js --no-cache --no-coverage --silent
        env:
          CI: true

  # ── Job 3: Security Audit ────────────────────────────────
  security:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install --legacy-peer-deps
      - name: Run npm audit
        run: |
          npm audit --production --audit-level=high 2>&1 | tee audit.txt
          if grep -q '"severity":"high"\|"severity":"critical"' audit.txt 2>/dev/null; then
            echo "❌ High/Critical vulnerabilities found!"
            exit 1
          else
            echo "✅ No High/Critical vulnerabilities"
          fi
        continue-on-error: true
      - name: Check for outdated deps
        run: npm outdated 2>&1 || true
      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-audit
          path: audit.txt
          retention-days: 7

  # ── Job 4: Build Verification ────────────────────────────
  build:
    name: 🏗️ Build Verification
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq build-essential python3
      - run: npm install --legacy-peer-deps
      - run: npm rebuild sqlite3 2>&1 || echo "sqlite3 rebuild skipped"
      - name: Verify all agents can be imported
        run: |
          echo "Checking agent imports..."
          node --input-type=module -e "
            const agents = [
              './agents/RagAgent.js',
              './agents/RouterAgent.js',
              './agents/DebateAgent.js',
              './agents/CoderAgent.js',
              './agents/VisionAgent.js',
              './agents/PlannerAgent.js',
            ];
            let ok = 0, fail = 0;
            for (const a of agents) {
              try {
                await import(a);
                console.log('  ✅ ' + a);
                ok++;
              } catch(e) {
                console.log('  ❌ ' + a + ': ' + e.message);
                fail++;
              }
            }
            console.log(ok + ' OK, ' + fail + ' FAILED');
            if (fail > 0) process.exit(1);
          "
      - name: Verify lib imports
        run: |
          echo "Checking lib imports..."
          node --input-type=module -e "
            const libs = [
              './lib/logger.js',
              './lib/llm.js',
              './lib/memory_manager.js',
              './lib/flashcard_db.js',
              './lib/user_profile.js',
              './lib/knowledge_graph.js',
              './lib/scope_detector.js',
              './lib/grounding_verifier.js',
            ];
            let ok = 0, fail = 0;
            for (const l of libs) {
              try {
                await import(l);
                console.log('  ✅ ' + l);
                ok++;
              } catch(e) {
                console.log('  ❌ ' + l + ': ' + e.message);
                fail++;
              }
            }
            console.log(ok + ' OK, ' + fail + ' FAILED');
            if (fail > 0) process.exit(1);
          "
      - name: Verify config files exist
        run: |
          echo "Checking config files..."
          for f in .env.example ecosystem.config.cjs package.json; do
            if [ -f "$f" ]; then
              echo "  ✅ $f"
            else
              echo "  ⚠️ $f (missing)"
            fi
          done
