name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

env:
  NODE_VERSION: '24'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: 🔍 Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq build-essential python3
      - run: npm install --legacy-peer-deps --ignore-scripts
      - run: npx prettier --check "**/*.js" "**/*.json" "**/*.md" || true
      - run: npx eslint . --ext .js --max-warnings=50 || true

  test:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq build-essential python3
      - run: npm install --legacy-peer-deps --ignore-scripts
      - run: npm test -- --forceExit --detectOpenHandles
        env:
          CI: true
          NODE_OPTIONS: --experimental-vm-modules
