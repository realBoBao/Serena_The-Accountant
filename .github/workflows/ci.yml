name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

env:
  NODE_VERSION: '20'

jobs:
  # ── Job 1: Install & Lint ──
  lint:
    name: 🔍 Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Check formatting (Prettier)
        run: npx prettier --check "**/*.js" "**/*.json" "**/*.md" || true

      - name: Run ESLint
        run: npx eslint . --ext .js --max-warnings=50 || true

  # ── Job 2: Unit Tests ──
  test:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run tests
        run: npm test -- --forceExit --detectOpenHandles
        env:
          CI: true
          NODE_OPTIONS: --experimental-vm-modules

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  # ── Job 3: Security Audit ──
  security:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run npm audit
        run: npm audit --audit-level=high || true

  # ── Job 4: Verify project structure ──
  verify:
    name: ✅ Verify Scripts
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Verify package.json is valid
        run: node -e "JSON.parse(require('fs').readFileSync('package.json','utf8')); console.log('package.json OK')"

      - name: Verify key entry points exist
        run: |
          node -e "require.resolve('./gateway.js'); console.log('gateway.js OK')" || true
          node -e "require.resolve('./index.js'); console.log('index.js OK')" || true

      - name: List test files
        run: ls tests/ 2>/dev/null || echo "No tests directory"
