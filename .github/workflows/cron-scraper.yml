# Cron Scraper — Data Pipeline (PDT timezone)
# 8AM PDT = 15:00 UTC, 8PM PDT = 03:00 UTC

name: 🕐 Cron Scraper

on:
  schedule:
    - cron: '0 15,3 * * *' # 8AM & 8PM PDT
  workflow_dispatch:
    inputs:
      topic:
        description: 'Chủ đề (trống = random)'
        required: false
        default: ''

env:
  NODE_VERSION: '24'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    name: 🔍 Search & Scrape Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: cron-scraper
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm install --legacy-peer-deps --ignore-scripts
      - run: mkdir -p artifacts backups
      - name: Run Data Pipeline
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: node pipeline_report_v2.js "${{ github.event.inputs.topic || 'backend beginner' }}"
