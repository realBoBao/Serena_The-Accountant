# Cron Scraper — Data Pipeline (PDT timezone)
# 8AM PDT = 15:00 UTC, 8PM PDT = 03:00 UTC

name: 🕐 Cron Scraper

on:
  schedule:
    - cron: '0 15,18,21,0,3 * * *' # 8AM, 11AM, 2PM, 5PM, 8PM PDT
    - cron: '0 9 * * *'             # 2AM PDT (nightly scraper)
  workflow_dispatch:
    inputs:
      topic:
        description: 'Chủ đề (trống = random)'
        required: false
        default: ''

env:
  NODE_VERSION: '24'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Job 1: Data Pipeline (multi-source search + scrape) ──
  scrape:
    name: 🔍 Search & Scrape Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: cron-scraper
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm install --legacy-peer-deps --ignore-scripts
      - run: mkdir -p artifacts backups
      - name: Run Data Pipeline
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: node pipeline_report_v2.js "${{ github.event.inputs.topic || 'backend beginner' }}"

  # ── Job 2: Daily Algorithm Problem (8AM PDT) ──
  algo-daily:
    name: 🧠 Daily Algo Problem
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm install --legacy-peer-deps --ignore-scripts
      - name: Send Daily Algo Problem
        env:
          ALGO_WEBHOOK_URL: ${{ secrets.ALGO_WEBHOOK_URL }}
        run: node cron/algo_webhook.js daily

  # ── Job 3: Tech News Webhook (11AM + 5PM PDT) ──
  tech-news:
    name: 📰 Tech News Digest
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm install --legacy-peer-deps --ignore-scripts
      - name: Send Tech News
        env:
          TECH_WEBHOOK_URL: ${{ secrets.TECH_WEBHOOK_URL }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: node cron/tech_news_webhook.js

  # ── Job 4: Job Scraper (6AM + 12PM + 6PM PDT) ──
  job-scraper:
    name: 💼 Job Alert Scraper
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm install --legacy-peer-deps --ignore-scripts
      - name: Scrape & Send Job Alerts
        env:
          JOB_WEBHOOK_URL: ${{ secrets.JOB_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node cron/job_scraper.js

  # ── Job 5: Nightly Scraper (2AM PDT) — Embed sources into vector DB ──
  nightly-scraper:
    name: 🌙 Nightly Source Scraper
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm install --legacy-peer-deps --ignore-scripts
      - name: Scrape & Embed Sources
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node cron/nightly_scraper.js
